upstream pdfwala_backend {
    server pdfwala_app:5000;
}

server {
    listen 80;
    server_name npkpadala.com www.npkpadala.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name npkpadala.com www.npkpadala.com;

    client_max_body_size 210m;

    ssl_certificate /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;

    location /pdfwala/ {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml";
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        add_header Content-Type "text/plain";
    }

    location = / {
        return 302 /pdfwala/;
    }

    location /api/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    location /download/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
