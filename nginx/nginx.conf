# ============================================================================
# PDFWala Enterprise V11.0.0 — Nginx Reverse Proxy
# ============================================================================
# Fixes applied:
#   - SPA redirect loop fixed with proper try_files fallback
#   - Timeouts raised to 900s for large file processing
#   - proxy_buffering off for streaming uploads/downloads
#   - Added keepalive and upstream retry
# ============================================================================

# Backend upstream with keepalive for better performance
upstream pdfwala_backend {
    server app:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name npkpadala.com www.npkpadala.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name npkpadala.com www.npkpadala.com;

    # ======================
    # SECURITY HEADERS
    # ======================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # V11: Match Gunicorn 900s timeout + 200MB upload limit
    client_max_body_size 210m;

    # SSL configuration
    ssl_certificate     /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Upstream retry on failure (handles brief container restarts)
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    proxy_next_upstream_tries 2;

    # ======================
    # ROOT — Redirect to PDFWala
    # ======================
    location = / {
        return 302 /pdfwala/;
    }

    # ======================
    # PDFWala SPA — Static Files (FIXED - No redirect loops)
    # ======================
    location /pdfwala/ {
        alias /usr/share/nginx/html/pdfwala/;
        try_files $uri $uri/ /pdfwala/index.html;
    }

    # Handle specific routes that might cause loops
    location = /pdfwala/privacy { alias /usr/share/nginx/html/pdfwala/index.html; }
    location = /pdfwala/terms   { alias /usr/share/nginx/html/pdfwala/index.html; }
    location = /pdfwala/about   { alias /usr/share/nginx/html/pdfwala/index.html; }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ======================
    # API — Relative paths from /pdfwala/ page
    # ======================
    # V11: Buffering OFF for large uploads, timeouts 900s
    location ^~ /pdfwala/api/ {
        proxy_pass http://pdfwala_backend/api/;
        
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_connect_timeout 60s;
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;

        client_max_body_size 210m;
    }

    # ======================
    # Download — Relative paths from /pdfwala/ page
    # ======================
    # V11: Buffering OFF for large file streaming
    location ^~ /pdfwala/download/ {
        proxy_pass http://pdfwala_backend/download/;
        proxy_set_header Host $host;

        proxy_buffering    off;
        proxy_read_timeout 900s;

        client_max_body_size 210m;
    }

    # ======================
    # Root-level API — Direct curl / External integrations
    # ======================
    location /api/ {
        proxy_pass http://pdfwala_backend;
        
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_connect_timeout 60s;
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;

        client_max_body_size 210m;
    }

    # ======================
    # Root-level Download
    # ======================
    location /download/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host $host;

        proxy_buffering    off;
        proxy_read_timeout 900s;

        client_max_body_size 210m;
    }

    # ======================
    # Health Check (no logging)
    # ======================
    location = /health {
        proxy_pass http://pdfwala_backend/health;
        access_log off;
    }
}
