# Backend upstream
upstream pdfwala_backend {
    server app:5000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name npkpadala.com www.npkpadala.com;

    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name npkpadala.com www.npkpadala.com;

    # ======================
    # SECURITY HEADERS
    # ======================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # FIX V11: Match gunicorn 900s timeout + 200MB upload limit
    client_max_body_size 210m;

    # SSL config — DO NOT CHANGE (domain certs)
    ssl_certificate     /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Root — serve index.html
    location = / {
        return 302 /pdfwala/;
    }

    # PDFWala static files + SPA fallback
    location /pdfwala/ {
        alias /usr/share/nginx/html/pdfwala/;
        try_files $uri $uri/ /pdfwala/index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==================================================================
    # API — relative calls from /pdfwala/ page
    # FIX V11: raise timeouts to 900s, disable buffering for large files
    # ==================================================================
    location ^~ /pdfwala/api/ {
        proxy_pass http://pdfwala_backend/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FIX V11: disable buffering so large uploads stream directly to Flask
        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_connect_timeout 60s;
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;

        client_max_body_size  210m;
    }

    # Download — relative links from /pdfwala/
    # FIX V11: disable buffering so large files stream to client immediately
    location ^~ /pdfwala/download/ {
        proxy_pass http://pdfwala_backend/download/;
        proxy_set_header Host $host;

        proxy_buffering      off;
        proxy_read_timeout   900s;
        client_max_body_size 210m;
    }

    # ==================================================================
    # Root-level API (direct curl / external integrations)
    # FIX V11: same timeout + buffering fixes
    # ==================================================================
    location /api/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_connect_timeout 60s;
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;

        client_max_body_size  210m;
    }

    # Root-level download
    location /download/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host $host;

        proxy_buffering      off;
        proxy_read_timeout   900s;
        client_max_body_size 210m;
    }
}
