# nginx.conf — PDFWala Production (HTTPS + SEO + Security)
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # ── Upload Size ─────────────────────────────────────────────
    client_max_body_size 210m;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css text/plain
               application/javascript application/json
               application/xml image/svg+xml;

    # ── Security Headers (Global) ───────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Rate Limiting ───────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=download:10m rate=60r/m;

    # ── Upstream ────────────────────────────────────────────────
    upstream pdfwala_app {
        server pdfwala:5000;
        keepalive 32;
    }

    # ───────── HTTP → HTTPS Redirect ────────────────────────────
    server {
        listen 80;
        server_name npkpadala.com www.npkpadala.com;
        return 301 https://$host$request_uri;
    }

    # ───────── HTTPS SERVER ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name npkpadala.com www.npkpadala.com;

        # ── SSL ─────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── HSTS ────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Static Asset Caching ────────────────────────────────
        location ~* \.(css|js|png|jpg|jpeg|ico|woff2|gif|svg|webp)$ {
            proxy_pass http://pdfwala_app;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Main App ────────────────────────────────────────────
        location / {
            proxy_pass http://pdfwala_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── API ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://pdfwala_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_buffering off;
        }

        # ── Downloads ───────────────────────────────────────────
        location /download/ {
            limit_req zone=download burst=20 nodelay;
            proxy_pass http://pdfwala_app;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Health Check ────────────────────────────────────────
        location /api/health {
            proxy_pass http://pdfwala_app;
            access_log off;
        }

        # ── Sitemap & Robots ────────────────────────────────────
        location = /sitemap.xml {
            proxy_pass http://pdfwala_app;
            proxy_set_header Host $host;
            access_log off;
        }

        location = /robots.txt {
            proxy_pass http://pdfwala_app;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
