# nginx.conf — PDFWala Production (HTTPS READY)

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # Upload size
    client_max_body_size 210m;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/html text/css application/javascript;
    gzip_min_length 1024;

    # Security headers
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=download:10m rate=60r/m;

    # Upstream
    upstream pdfwala_app {
        server pdfwala:5000;
        keepalive 32;
    }

    # ───────── HTTP → HTTPS Redirect ─────────
    server {
        listen 80;
        server_name npkpadala.com www.npkpadala.com;
        return 301 https://$host$request_uri;
    }

    # ───────── HTTPS SERVER ─────────
    server {
        listen 443 ssl http2;
        server_name npkpadala.com www.npkpadala.com;

        ssl_certificate /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ─── Main App ───
        location / {
            proxy_pass http://pdfwala_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ─── API ───
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://pdfwala_app;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 180s;
            proxy_send_timeout 180s;

            proxy_buffering off;
        }

        # ─── Downloads ───
        location /download/ {
            limit_req zone=download burst=20 nodelay;

            proxy_pass http://pdfwala_app;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ─── Health ───
        location /api/health {
            proxy_pass http://pdfwala_app;
            access_log off;
        }
    }
}
