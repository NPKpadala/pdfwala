# =============================================================================
# PDFWala — Nginx Config (Cloudflare-aware)
#=============================================================================
limit_req_zone  $realip_remote_addr zone=upload_limit:10m rate=60r/m;
limit_req_zone  $realip_remote_addr zone=dl_limit:10m     rate=20r/m;
limit_req_zone  $realip_remote_addr zone=api_limit:10m    rate=10r/m;
limit_conn_zone $realip_remote_addr zone=conn_limit:10m;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream pdfwala_backend {
    server pdfwala-app:5000 max_fails=3 fail_timeout=30s;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# =============================================================================
# BLOCK DIRECT IP ACCESS
# Anyone hitting your server IP directly (bypassing Cloudflare) gets dropped.
# Your Oracle server's public IP should only accept connections from Cloudflare.
# This is the "lock your server" step from your ⚠️ REMAINING list.
# =============================================================================
server {
    listen 80  default_server;
    listen 443 default_server ssl;
    server_name _;

    # Self-signed cert just to satisfy nginx ssl syntax for default_server
    ssl_certificate     /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;

    # Drop connection silently — no response, no fingerprint
    return 444;
}

# =============================================================================
# HTTP server — only for Let's Encrypt renewal
# Cloudflare handles HTTP→HTTPS redirect at edge (Always HTTPS = ON)
# so this server block only needs to exist for certbot ACME challenges
# =============================================================================
server {
    listen 80;
    server_name npkpadala.com www.npkpadala.com;

    # Let's Encrypt ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Everything else — Cloudflare already redirects to HTTPS
    # but add this as fallback just in case
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — Main server
# Cloudflare connects to this with a valid cert (Full strict mode)
# Real user IPs come from CF-Connecting-IP header
# =============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name npkpadala.com www.npkpadala.com;
    server_tokens off;

    # ── SSL (Origin cert for Cloudflare Full strict) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── Extract real user IP from Cloudflare header ───────────────────────────
    # CRITICAL: Without this, rate limiting uses Cloudflare's IP
    # and every user shares one rate limit bucket — breaking everything
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header     CF-Connecting-IP;

    # ── Security headers ──────────────────────────────────────────────────────
    # Note: Cloudflare adds some of these at edge too — having both is fine
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # Hide backend info
    proxy_hide_header X-Powered-By;
    proxy_hide_header Via;
    proxy_hide_header Server;

    # ── Gzip (origin-level, Cloudflare serves Brotli at edge) ────────────────
    # Cloudflare decompresses gzip from origin and re-serves as Brotli to user
    # So gzip here is for the Cloudflare→Origin leg only
    gzip            on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript
        application/xml+rss image/svg+xml;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size  200m;   # Hard cap — pro tier max
                                  # Free tier (20MB) enforced in Flask validators.py
    client_body_timeout   120s;
    client_header_timeout  30s;
    send_timeout           60s;
    keepalive_timeout      30s;
    keepalive_requests    100;

    # ── Proxy retry — SAFE ────────────────────────────────────────────────────
    # NEVER retry on 5xx — prevents double-processing uploads
    proxy_next_upstream       error timeout invalid_header;
    proxy_next_upstream_tries 1;

    # ── Per-IP connection limit (using real IP from Cloudflare) ───────────────
    limit_conn conn_limit 30;

    # ─────────────────────────────────────────────────────────────────────────
    # BOT BLOCKING — second line of defense after Cloudflare Bot Fight Mode
    # Blocks anything that slips past Cloudflare (direct crawlers, VPN bots)
    # ─────────────────────────────────────────────────────────────────────────
    location ~* \.(env|git|svn|htaccess|htpasswd|DS_Store|bak|sql|log)$ {
        return 444;
    }
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* /(wp-admin|wp-login|phpmyadmin|xmlrpc|actuator|\.dockerenv) {
        return 444;
    }
    if ($http_user_agent ~* (zgrab|masscan|nmap|gobuster|sqlmap|nikto|nessus|dirbuster|nuclei)) {
        return 444;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # ROOT
    # ─────────────────────────────────────────────────────────────────────────
    location = / {
        return 302 /pdfwala/;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HEALTH CHECK
    # Cloudflare cache rule: /api/ → bypass — so health check is never cached
    # ─────────────────────────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://pdfwala_backend/health;
        proxy_set_header Host $host;
        access_log off;
        limit_except GET { deny all; }
    }

    location = /api/v1/health {
        proxy_pass http://pdfwala_backend/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
        limit_except GET { deny all; }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # STATIC FILES — /pdfwala/
    # Cloudflare caches these at edge for 2 hours (your cache rule)
    # Nginx serves them from disk when Cloudflare cache misses
    # ─────────────────────────────────────────────────────────────────────────
    location /pdfwala/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /pdfwala/index.html;

        # Versioned static assets — 1 year cache
        # Cloudflare will cache these too (longer than your 2hr rule)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # SPA routes — all serve index.html
    location = /pdfwala/privacy  { alias /usr/share/nginx/html/index.html; }
    location = /pdfwala/terms    { alias /usr/share/nginx/html/index.html; }
    location = /pdfwala/about    { alias /usr/share/nginx/html/index.html; }
    location = /pdfwala/contact  { alias /usr/share/nginx/html/index.html; }

    # ─────────────────────────────────────────────────────────────────────────
    # JOB STATUS POLLING — /pdfwala/api/v1/jobs/<id>
    # Must match BEFORE the general /pdfwala/api/ block
    # Cloudflare cache: /api/ → bypass (correct — job status must be live)
    # Higher rate limit: polling every 5s needs burst headroom
    # ─────────────────────────────────────────────────────────────────────────
    location ~* ^/pdfwala/api/v1/jobs/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header Connection        "";

        proxy_buffering      off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;    # job status is instant

        limit_req zone=api_limit burst=30 nodelay;
        limit_except GET { deny all; }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # JOB STATUS POLLING — flat /jobs/<id>  (frontend polls this URL directly)
    # status_url returned by backend is /jobs/<id> — must be routed here
    # ─────────────────────────────────────────────────────────────────────────
    location ~* ^/jobs/ {
        proxy_pass http://pdfwala_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering      off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        limit_req zone=api_limit burst=30 nodelay;
        limit_except GET { deny all; }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # API — /pdfwala/api/ (browser) and /api/ (direct)
    # Cloudflare cache rule: /api/ → bypass (correct)
    # Rate limit: 3 uploads/min per IP (strict — processing is expensive)
    # Timeout: 3600s = 60 min (matches OCR task time_limit)
    # ─────────────────────────────────────────────────────────────────────────
    location ^~ /pdfwala/api/ {
        proxy_pass http://pdfwala_backend/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;    # stream uploads directly — no RAM buffer
        proxy_connect_timeout   60s;
        proxy_read_timeout      3600s;  # 60 min for large OCR / chunked jobs
        proxy_send_timeout      3600s;

        client_max_body_size 200m;

        limit_req zone=upload_limit burst=25 nodelay;
        limit_except GET POST { deny all; }
    }

    location ^~ /api/ {
        proxy_pass http://pdfwala_backend/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header Connection        "";

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_connect_timeout   60s;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;

        client_max_body_size 200m;

        limit_req zone=upload_limit burst=25 nodelay;
        limit_except GET POST { deny all; }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # DOWNLOADS — /pdfwala/download/ and /download/
    # Cloudflare cache rule: /download/ → bypass (correct — signed URLs unique)
    # Only GET allowed. Signed URL verified in Flask.
    # ─────────────────────────────────────────────────────────────────────────
    location ^~ /pdfwala/download/ {
        proxy_pass http://pdfwala_backend/download/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 600s;    # 10 min for large file download

        limit_req zone=dl_limit burst=10 nodelay;
        limit_except GET { deny all; }
    }

    location ^~ /download/ {
        proxy_pass http://pdfwala_backend/download/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $realip_remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 600s;

        limit_req zone=dl_limit burst=10 nodelay;
        limit_except GET { deny all; }
    }

}
