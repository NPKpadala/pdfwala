# nginx.conf — PDFWala Production
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ──────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ─── Upload size (match Flask 200MB) ──────────────────────────
    client_max_body_size 210m;
    client_body_timeout  120s;
    client_header_timeout 30s;

    # ─── Gzip (for JSON API responses only, NOT binary downloads) ─
    gzip on;
    gzip_types application/json text/plain text/html text/css application/javascript;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # ─── Security headers ─────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ─── Rate limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=download:10m rate=60r/m;

    # ─── Upstream ─────────────────────────────────────────────────
    upstream pdfwala_app {
        server pdfwala:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ─── Redirect HTTP → HTTPS (uncomment when SSL ready) ─────
        # return 301 https://$host$request_uri;

        # ─── Static files (SPA) ───────────────────────────────────
        location / {
            proxy_pass         http://pdfwala_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Buffer for regular pages
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }

        # ─── API endpoints ────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://pdfwala_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long timeout for LibreOffice/OCR processing
            proxy_read_timeout  180s;
            proxy_send_timeout  180s;
            proxy_connect_timeout 10s;

            # Disable buffering — stream responses directly
            proxy_buffering    off;
            proxy_request_buffering off;

            # Upload size
            client_max_body_size 210m;
        }

        # ─── Downloads — FAST, no buffering ──────────────────────
        location /download/ {
            limit_req zone=download burst=20 nodelay;

            proxy_pass         http://pdfwala_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # KEY: disable all buffering for fast downloads
            proxy_buffering            off;
            proxy_request_buffering    off;

            # Hint to Flask/gunicorn: don't buffer
            proxy_set_header X-Accel-Buffering no;

            # Large file timeout
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;

            # Caching headers for download files
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ─── Health check (no rate limit) ─────────────────────────
        location /api/health {
            proxy_pass         http://pdfwala_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 10s;
            access_log off;
        }
    }

    # ─── HTTPS server (uncomment when SSL certificates are ready) ─
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/ssl/certs/fullchain.pem;
    #     ssl_certificate_key /etc/ssl/private/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     # ... copy location blocks from above ...
    # }
}
