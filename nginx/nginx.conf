upstream pdfwala_app {
    server pdfwala:5000;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=download:10m rate=60r/m;

server {
    listen 80;
    server_name npkpadala.com www.npkpadala.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name npkpadala.com www.npkpadala.com;

    ssl_certificate /etc/letsencrypt/live/npkpadala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npkpadala.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 210m;

    location / {
        proxy_pass http://pdfwala_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://pdfwala_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location /download/ {
        limit_req zone=download burst=20 nodelay;
        proxy_pass http://pdfwala_app;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api/health {
        proxy_pass http://pdfwala_app;
        access_log off;
    }
}
