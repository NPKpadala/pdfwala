upstream pdfwala_app {
    server pdfwala:5000;
}

server {
    listen 80;
    server_name npkpadala.com _;   # Change to your domain when you add SSL

    client_max_body_size 210m;     # Allow large PDF uploads

    # Serve static files (index.html, CSS, JS) directly from Nginx - Fast!
    root /usr/share/nginx/html;
    index index.html;

    # Main frontend (SPA style)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # All API calls go to Flask backend
    location /api/ {
    proxy_pass http://pdfwala_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 600s;   
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;  
    }

    # File downloads
    location /download/ {
        proxy_pass http://pdfwala_app;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 180s;
    }

    # Fast health check
    location /api/health {
        proxy_pass http://pdfwala_app;
        access_log off;
    }
}
