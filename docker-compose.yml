
services:
  flask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfwala_flask
    restart: unless-stopped
    environment:
      - UPLOAD_FOLDER=/tmp/pdfwala/uploads
      - OUTPUT_FOLDER=/tmp/pdfwala/outputs
      - MAX_FILE_SIZE=104857600
      - RATE_LIMIT=30
      - FILE_TTL_SEC=3600
      - SECRET_KEY=fac6889db2b4c1204251e60b8b3940b130b7ce4e337a60fedbe4b3f1b52b94ad
    volumes:
      - /home/opc/pdfwala/uploads:/tmp/pdfwala/uploads
      - /home/opc/pdfwala/outputs:/tmp/pdfwala/outputs
    expose:
      - "5000"
    networks:
      - pdfwala_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.25-alpine
    container_name: pdfwala_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      flask:
        condition: service_healthy
    networks:
      - pdfwala_net

volumes:

  nginx_logs:

networks:
  pdfwala_net:
    driver: bridge
