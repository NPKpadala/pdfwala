# ============================================================================
# PDFWala Enterprise V11.0.0 — Docker Compose
# ============================================================================

# ============================================================================
# SHARED ENVIRONMENT
# ============================================================================
x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY:-changeme-in-production-min-32-chars}
  SIGNED_URL_SECRET: ${SIGNED_URL_SECRET:-changeme-in-production}
  API_KEY: ${API_KEY:-}
  REDIS_URL: redis://redis:6379/0
  BASE_DATA_DIR: /home/opc/pdfwala
  UPLOAD_FOLDER: /home/opc/pdfwala/uploads
  OUTPUT_FOLDER: /home/opc/pdfwala/outputs
  TEMP_FOLDER: /home/opc/pdfwala/temp
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  MAX_FILE_SIZE: ${MAX_FILE_SIZE:-209715200}
  FILE_TTL_SEC: ${FILE_TTL_SEC:-3600}
  CELERY_FAST_QUEUE_MAX: ${CELERY_FAST_QUEUE_MAX:-500}
  CELERY_OFFICE_QUEUE_MAX: ${CELERY_OFFICE_QUEUE_MAX:-200}
  CELERY_SLOW_QUEUE_MAX: ${CELERY_SLOW_QUEUE_MAX:-100}
  PYTHONUNBUFFERED: "1"
  # ── V11.0.0 additions ──────────────────────────────────────────────────────
  JOB_TTL_SEC: ${JOB_TTL_SEC:-7200}
  CLEANUP_MAX_DELETES: ${CLEANUP_MAX_DELETES:-500}
  MAX_SLIDES_PPT: ${MAX_SLIDES_PPT:-200}
  SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-30}
  MAX_OCR_THREADS: ${MAX_OCR_THREADS:-2}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
  GUNICORN_THREADS: ${GUNICORN_THREADS:-8}

# ============================================================================
# SERVICES
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # Redis — Message Broker & Cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pdfwala-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Flask Application
  # --------------------------------------------------------------------------
  app:
    build: .
    container_name: pdfwala-app
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ./uploads:/home/opc/pdfwala/uploads
      - ./outputs:/home/opc/pdfwala/outputs
      - ./temp:/home/opc/pdfwala/temp
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Celery Worker — Fast Queue (Compression, Merge, Split, Watermark)
  # --------------------------------------------------------------------------
  worker-fast:
    build: .
    container_name: pdfwala-worker-fast
    restart: unless-stopped
    command: >
      celery -A workers.celery_app:celery_app worker
      -Q fast
      --concurrency=4
      --loglevel=info
      --hostname=worker-fast@%h
      --max-tasks-per-child=50
    volumes:
      - ./uploads:/home/opc/pdfwala/uploads
      - ./outputs:/home/opc/pdfwala/outputs
      - ./temp:/home/opc/pdfwala/temp
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    # FIX: Added missing healthcheck — required for dependent service stability
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping -d celery@$$HOSTNAME 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Celery Worker — Office Queue (Word, Excel, PPT conversions)
  # --------------------------------------------------------------------------
  worker-office:
    build: .
    container_name: pdfwala-worker-office
    restart: unless-stopped
    command: >
      celery -A workers.celery_app:celery_app worker
      -Q office
      --concurrency=2
      --loglevel=info
      --hostname=worker-office@%h
      --max-tasks-per-child=20
    volumes:
      - ./uploads:/home/opc/pdfwala/uploads
      - ./outputs:/home/opc/pdfwala/outputs
      - ./temp:/home/opc/pdfwala/temp
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    # FIX: Added missing healthcheck
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping -d celery@$$HOSTNAME 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Celery Worker — Slow Queue (OCR, PDF/A, heavy processing)
  # --------------------------------------------------------------------------
  worker-slow:
    build: .
    container_name: pdfwala-worker-slow
    restart: unless-stopped
    command: >
      celery -A workers.celery_app:celery_app worker
      -Q slow
      --concurrency=1
      --loglevel=info
      --hostname=worker-slow@%h
      --max-tasks-per-child=10
    volumes:
      - ./uploads:/home/opc/pdfwala/uploads
      - ./outputs:/home/opc/pdfwala/outputs
      - ./temp:/home/opc/pdfwala/temp
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    # FIX: Added missing healthcheck
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app inspect ping -d celery@$$HOSTNAME 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Nginx — Reverse Proxy & Static Files
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: pdfwala-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - pdfwala-network

# ============================================================================
# VOLUMES & NETWORKS
# ============================================================================
volumes:
  redis_data:
    driver: local

networks:
  pdfwala-network:
    driver: bridge
