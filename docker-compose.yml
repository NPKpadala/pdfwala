version: "3.9"

services:

  # ─── Flask App (Gunicorn) ─────────────────────────────────────
  pdfwala:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfwala_app
    restart: unless-stopped
    environment:
      - BASE_DIR=/app
      - UPLOAD_FOLDER=/app/uploads
      - OUTPUT_FOLDER=/app/outputs
      - STATIC_FOLDER=/app/static
      - FILE_TTL_SEC=3600
      - RATE_LIMIT=30
      - MAX_FILE_SIZE=209715200
      - LIBREOFFICE_PATH=soffice
      - GHOSTSCRIPT_PATH=gs
      # Set your CORS origin in production:
      # - ALLOWED_ORIGINS=https://yourdomain.com
    volumes:
      # Bind mounts — predictable paths, easy backup, no volume orphans
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./static:/app/static
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Memory limit — prevent OOM from large PDF processing
    mem_limit: 2g
    memswap_limit: 2g
    # Shared memory for gunicorn worker heartbeat
    shm_size: 128mb
    networks:
      - pdfwala_net

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: pdfwala_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS:
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL:
      # - ./ssl/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/ssl/private/privkey.pem:ro
    depends_on:
      pdfwala:
        condition: service_healthy
    networks:
      - pdfwala_net

networks:
  pdfwala_net:
    driver: bridge
