version: "3.9"

services:

  pdfwala:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfwala_app
    restart: unless-stopped
    environment:
      - BASE_DIR=/app
      - UPLOAD_FOLDER=/app/uploads
      - OUTPUT_FOLDER=/app/outputs
      - STATIC_FOLDER=/app/static
      - FILE_TTL_SEC=3600
      - RATE_LIMIT=30
      - MAX_FILE_SIZE=209715200
      - LIBREOFFICE_PATH=soffice
      - GHOSTSCRIPT_PATH=gs
      - ALLOWED_ORIGINS=https://npkpadala.com
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./static:/app/static
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 2g
    memswap_limit: 2g
    shm_size: 128mb
    networks:
      - pdfwala_net

  nginx:
    image: nginx:1.25-alpine
    container_name: pdfwala_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      pdfwala:
        condition: service_healthy
    networks:
      - pdfwala_net

networks:
  pdfwala_net:
    driver: bridge
