# ============================================================================
# PDFWala Enterprise V11.0.0 — Docker Compose (Security Hardened)
# ============================================================================
# FIXED: All containers now run as non-root user to prevent root-security blocks
# Added --uid 1000 to all services that process files (workers, app)
# ============================================================================

# ============================================================================
# SHARED ENVIRONMENT VARIABLES
# ============================================================================
x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY:-changeme-in-production-min-32-chars}
  SIGNED_URL_SECRET: ${SIGNED_URL_SECRET:-changeme-in-production}
  REDIS_URL: redis://redis:6379/0
  BASE_DATA_DIR: /home/pdfwala/data
  UPLOAD_FOLDER: /home/pdfwala/data/uploads
  OUTPUT_FOLDER: /home/pdfwala/data/outputs
  TEMP_FOLDER: /home/pdfwala/data/temp
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  MAX_FILE_SIZE: ${MAX_FILE_SIZE:-209715200}
  FILE_TTL_SEC: ${FILE_TTL_SEC:-3600}
  CELERY_FAST_QUEUE_MAX: ${CELERY_FAST_QUEUE_MAX:-500}
  CELERY_OFFICE_QUEUE_MAX: ${CELERY_OFFICE_QUEUE_MAX:-200}
  CELERY_SLOW_QUEUE_MAX: ${CELERY_SLOW_QUEUE_MAX:-100}
  PYTHONUNBUFFERED: "1"
  # ── V11.0.0 additions ──────────────────────────────────────────────────
  JOB_TTL_SEC: ${JOB_TTL_SEC:-7200}
  CLEANUP_MAX_DELETES: ${CLEANUP_MAX_DELETES:-500}
  MAX_SLIDES_PPT: ${MAX_SLIDES_PPT:-200}
  SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-30}
  MAX_OCR_THREADS: ${MAX_OCR_THREADS:-2}
  MAX_COMPARE_PAGES: ${MAX_COMPARE_PAGES:-50}
  MAX_OCR_PAGES_SYNC: ${MAX_OCR_PAGES_SYNC:-30}
  MAX_IMAGE_PAGES: ${MAX_IMAGE_PAGES:-50}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
  GUNICORN_THREADS: ${GUNICORN_THREADS:-8}
  ASYNC_FILE_THRESHOLD: ${ASYNC_FILE_THRESHOLD:-10485760}

# ============================================================================
# SERVICES
# ============================================================================
services:

  # --------------------------------------------------------------------------
  # Redis — Message Broker & Cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pdfwala-redis
    restart: unless-stopped
    user: "999:999"  # Redis default user
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Flask Application (Non-Root User)
  # --------------------------------------------------------------------------
  app:
    build: .
    container_name: pdfwala-app
    restart: unless-stopped
    user: "1000:1000"  # 🔒 FIX: Run as non-root pdfwala user
    expose:
      - "5000"
    volumes:
      - ./uploads:/home/pdfwala/data/uploads:rw
      - ./outputs:/home/pdfwala/data/outputs:rw
      - ./temp:/home/pdfwala/data/temp:rw
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Celery Worker — Fast Queue (Compression, Merge, Split, Watermark)
  # --------------------------------------------------------------------------
  worker-fast:
    build: .
    container_name: pdfwala-worker-fast
    restart: unless-stopped
    user: "1000:1000"  # 🔒 FIX: Non-root — Ghostscript won't block PDF compression
    command: >
      celery -A workers.celery_app:celery_app worker
      -Q fast
      --concurrency=4
      --loglevel=info
      --hostname=worker-fast@%h
      --max-tasks-per-child=50
    volumes:
      - ./uploads:/home/pdfwala/data/uploads:rw
      - ./outputs:/home/pdfwala/data/outputs:rw
      - ./temp:/home/pdfwala/data/temp:rw
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app:celery_app inspect ping -d worker-fast@$$(hostname) 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Celery Worker — Office Queue (Word, Excel, PPT conversions)
  # --------------------------------------------------------------------------
  worker-office:
    build: .
    container_name: pdfwala-worker-office
    restart: unless-stopped
    user: "1000:1000"  # 🔒 FIX: LibreOffice refuses to run as root
    command: >
      celery -A workers.celery_app:celery_app worker
      -Q office
      --concurrency=2
      --loglevel=info
      --hostname=worker-office@%h
      --max-tasks-per-child=20
    volumes:
      - ./uploads:/home/pdfwala/data/uploads:rw
      - ./outputs:/home/pdfwala/data/outputs:rw
      - ./temp:/home/pdfwala/data/temp:rw
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app:celery_app inspect ping -d worker-office@$$(hostname) 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Celery Worker — Slow Queue (OCR, PDF/A, heavy processing)
  # --------------------------------------------------------------------------
  worker-slow:
    build: .
    container_name: pdfwala-worker-slow
    restart: unless-stopped
    user: "1000:1000"  # 🔒 FIX: Tesseract OCR and heavy tools need non-root
    command: >
      celery -A workers.celery_app:celery_app worker
      -Q slow
      --concurrency=1
      --loglevel=info
      --hostname=worker-slow@%h
      --max-tasks-per-child=10
    volumes:
      - ./uploads:/home/pdfwala/data/uploads:rw
      - ./outputs:/home/pdfwala/data/outputs:rw
      - ./temp:/home/pdfwala/data/temp:rw
    environment:
      <<: *app-env
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app:celery_app inspect ping -d worker-slow@$$(hostname) 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - pdfwala-network

  # --------------------------------------------------------------------------
  # Nginx — Reverse Proxy & Static Files (Runs on port 80/443)
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: pdfwala-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pdfwala-network

# ============================================================================
# VOLUMES & NETWORKS
# ============================================================================
volumes:
  redis_data:
    driver: local

networks:
  pdfwala-network:
    driver: bridge
