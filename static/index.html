<script>

// ================= CONFIG =================
const API = '';

// ================= BACKEND CHECK =================
async function checkBackend() {
  try {
    const res = await fetch(API + '/api/health');
    if (!res.ok) throw new Error();

    document.querySelectorAll('.setup-box').forEach(el => el.classList.remove('show'));
    return true;

  } catch {
    document.querySelectorAll('.setup-box').forEach(el => el.classList.add('show'));
    return false;
  }
}

// ================= INIT =================
window.addEventListener('load', () => {
  checkBackend();
});

// ================= PROCESS =================
async function processFile(toolKey, files) {

  const ok = await checkBackend();
  if (!ok) {
    showToast("Backend not connected ❌", "error");
    return;
  }

  if (!files || files.length === 0) {
    showToast("Upload file first ⚠️", "error");
    return;
  }

  const tool = TOOLS[toolKey];
  const fd = new FormData();

  if (tool.multi) {
    files.forEach(f => fd.append(tool.field, f));
  } else {
    fd.append(tool.field, files[0]);
  }

  document.querySelectorAll('#modalContent input, #modalContent select').forEach(el => {
    if (el.id && el.type !== 'file') {
      fd.append(el.id, el.value);
    }
  });

  try {
    showToast("Processing... ⏳");

    const res = await fetch(API + tool.endpoint, {
      method: "POST",
      body: fd
    });

    if (!res.ok) throw new Error();

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "output.pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();

    showToast("Done ✅", "success");

  } catch (e) {
    showToast("Error ❌", "error");
  }
}

// ================= TOAST =================
function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  const m = document.getElementById("toastMsg");

  m.textContent = msg;
  t.className = "toast show " + type;

  setTimeout(() => t.classList.remove("show"), 3000);
}

// ================= THEME =================
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute("data-theme",
    html.getAttribute("data-theme") === "dark" ? "light" : "dark"
  );
}

// ================= FILTER =================
function filterCat(cat, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  document.querySelectorAll('.tool-card').forEach(card => {
    card.style.display = (cat === 'all' || card.dataset.cat === cat) ? 'block' : 'none';
  });
}

// ================= MODAL =================
function openTool(name) {
  alert(name + " ready");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function overlayClick(e) {
  if (e.target.id === "modalOverlay") closeModal();
}

// ================= COMING SOON =================
function comingSoon(name) {
  showToast(name + " coming soon 🚀");
}

</script>
