<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>PDFWala — All-in-One PDF Tools</title>
    <style>
        /* Add this small fix to your existing style block to ensure the download button is visible */
        .btn-download.show {
            display: flex !important;
            background: #10B981 !important;
            color: white !important;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

<script>
// ── Fixed Config ──────────────────────────────────────────────────────────────
// This automatically detects your server IP so you don't have to hardcode it!
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : window.location.origin;

// ── State ─────────────────────────────────────────────────────────────────────
let currentTool = null;
let selectedFiles = [];
let lastDownloadUrl = null; // Changed from lastFilename for better reliability

// ... (Keep all your existing TOOL definitions and UI functions) ...

// ── Updated Process Function ──────────────────────────────────────────────────
async function processFile(){
    if(!currentTool || !selectedFiles.length) return;
    const tool = TOOLS[currentTool];

    const actionBtn = document.getElementById('actionBtn');
    actionBtn.disabled = true;
    actionBtn.innerHTML = `Processing...`;

    const pb = document.getElementById('progressBlock');
    const pf = document.getElementById('progressFill');
    const pt = document.getElementById('progressText');
    const rb = document.getElementById('resultBlock');
    const db = document.getElementById('downloadBtn');

    pb.classList.add('show');
    rb.classList.remove('show');
    db.classList.remove('show');

    let pct = 0;
    const ticker = setInterval(() => {
        pct = Math.min(pct + Math.random() * 15, 90);
        pf.style.width = pct + '%';
        pt.textContent = pct < 50 ? 'Uploading...' : 'Processing PDF...';
    }, 200);

    try {
        const fd = new FormData();
        if(tool.multi) selectedFiles.forEach(f => fd.append(tool.field, f));
        else fd.append(tool.field, selectedFiles[0]);

        // Gather form data
        const fields = ['quality','format','dpi','degrees','text','color','opacity','password','position','start','action','order'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if(el) fd.append(id, id === 'opacity' ? (parseFloat(el.value)/100).toFixed(2) : el.value);
        });

        const res = await fetch(API + tool.endpoint, { method: 'POST', body: fd });
        const data = await res.json();
        
        clearInterval(ticker);
        pf.style.width = '100%';
        pt.textContent = 'Complete!';

        if(data.success) {
            // SUCCESS LOGIC
            lastDownloadUrl = data.download_url; // Store the URL from backend
            showResult('success', data);
            
            // Show Download Button and Hide Process Button
            db.classList.add('show'); 
            actionBtn.style.display = 'none'; 
            toast('Successfully processed!', 'success');
        } else {
            showResult('error', data);
            actionBtn.disabled = false;
        }
    } catch(err) {
        clearInterval(ticker);
        console.error(err);
        toast('Server connection failed', 'error');
        actionBtn.disabled = false;
    }
    
    actionBtn.innerHTML = `Process File`;
}

// ── Fixed Download Function ──────────────────────────────────────────────────
function downloadResult() {
    if (!lastDownloadUrl) {
        toast('Download link missing', 'error');
        return;
    }
    
    // Create a temporary link and click it to trigger download
    const link = document.createElement('a');
    link.href = API + lastDownloadUrl;
    link.setAttribute('download', ''); 
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function showResult(type, data) {
    const rb = document.getElementById('resultBlock');
    const ri = document.getElementById('resultInner');
    const rt = document.getElementById('resultTitle');
    const rm = document.getElementById('resultMeta');

    rb.classList.add('show');
    ri.className = `result-inner ${type}`;
    rt.textContent = type === 'success' ? `✓ ${data.message}` : `✕ ${data.message || 'Error'}`;

    const pills = [];
    if(data.size_human) pills.push(data.size_human);
    if(data.reduction_pct) pills.push(`${data.reduction_pct}% smaller`);
    rm.innerHTML = pills.map(p => `<span class="result-pill">${p}</span>`).join('');
}

// ... (Keep the rest of your existing JS functions: radioSelect, toast, etc.) ...
</script>
</body>
</html>
