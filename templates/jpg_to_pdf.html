<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Convert JPG images to PDF online for free. Combine multiple JPGs into one PDF instantly."/>
  <title>JPG to PDF Converter — PDFWala</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { font-size: 32px; margin-bottom: 12px; color: #1a1a2e; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sub { color: #666; margin-bottom: 32px; line-height: 1.6; }
    input[type="file"] {
      width: 100%;
      padding: 40px 20px;
      border: 2px dashed #ddd;
      border-radius: 16px;
      background: #fafafa;
      cursor: pointer;
      margin-bottom: 16px;
      transition: all 0.3s;
    }
    input[type="file"]:hover { border-color: #667eea; background: #f8f9ff; }
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #667eea; }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .status.success { background: #d4edda; color: #155724; display: block; border-left: 4px solid #28a745; }
    .status.error { background: #f8d7da; color: #721c24; display: block; border-left: 4px solid #dc3545; }
    .status.loading { background: #e7f3ff; color: #004085; display: block; border-left: 4px solid #007bff; }
    .download-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .download-btn:hover { transform: translateY(-2px); background: #218838; }
    .file-list {
      margin-top: 16px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .file-list.show { display: block; }
    .file-item {
      background: #f5f5f5;
      padding: 8px 12px;
      margin: 6px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      animation: slideIn 0.2s ease;
    }
    .file-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; text-align: left; }
    .remove-file {
      background: #ff4757;
      color: white;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      margin-left: 8px;
    }
    .remove-file:hover { background: #ff3838; }
    .clear-btn {
      background: #6c757d;
      margin-top: 8px;
      padding: 8px;
      font-size: 12px;
    }
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      transition: all 0.3s;
    }
    .footer a:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .count-badge {
      display: inline-block;
      background: #667eea;
      color: white;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      .card { padding: 24px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>
      <span>🖼️</span>
      JPG to PDF Converter
    </h1>
    <p class="sub">Convert one or multiple JPG images into a single PDF file.<br>Free, instant, no registration required.</p>

    <form id="j2pForm" enctype="multipart/form-data">
      <input type="file" id="files" name="files" accept=".jpg,.jpeg" multiple required/>
      <select id="page_size" name="page_size">
        <option value="auto">Auto (fit image)</option>
        <option value="a4">A4 (210 × 297 mm)</option>
        <option value="letter">Letter (8.5 × 11 in)</option>
      </select>
      <button type="submit" id="submitBtn">🖼️ Convert to PDF</button>
    </form>

    <div class="file-list" id="fileList">
      <div style="text-align: center; color: #999; padding: 12px;">No files selected</div>
    </div>

    <div id="status" class="status"></div>
    <a id="downloadLink" class="download-btn" style="display:none" href="#">⬇ Download PDF</a>
  </div>

  <div class="footer">
    <a href="/pdfwala/merge-pdf">🔗 Merge PDF</a>
    <a href="/pdfwala/compress-pdf">🗜️ Compress PDF</a>
    <a href="/pdfwala/pdf-to-word">📝 PDF to Word</a>
    <a href="/pdfwala/">🏠 All Tools</a>
  </div>
</div>

<script>
  let selectedFiles = [];
  const fileInput = document.getElementById('files');
  const fileListDiv = document.getElementById('fileList');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');
  const downloadLink = document.getElementById('downloadLink');
  const pageSizeSelect = document.getElementById('page_size');
  
  fileInput.addEventListener('change', function() {
    selectedFiles = Array.from(this.files);
    renderFileList();
  });
  
  function renderFileList() {
    if (selectedFiles.length === 0) {
      fileListDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 12px;">No files selected</div>';
      fileListDiv.classList.remove('show');
      return;
    }
    
    fileListDiv.classList.add('show');
    fileListDiv.innerHTML = `
      <div style="margin-bottom: 8px; font-size: 13px; color: #667eea;">
        📸 ${selectedFiles.length} image(s) selected
        <button type="button" class="clear-btn" onclick="clearAllFiles()" style="float: right; width: auto; padding: 4px 12px;">Clear All</button>
      </div>
      ${selectedFiles.map((file, index) => `
        <div class="file-item">
          <span>🖼️ ${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
          <button type="button" class="remove-file" onclick="removeFile(${index})">✕</button>
        </div>
      `).join('')}
    `;
  }
  
  window.removeFile = function(index) {
    selectedFiles.splice(index, 1);
    renderFileList();
    // Update file input
    const dt = new DataTransfer();
    selectedFiles.forEach(f => dt.items.add(f));
    fileInput.files = dt.files;
  };
  
  window.clearAllFiles = function() {
    selectedFiles = [];
    fileInput.value = '';
    renderFileList();
    statusDiv.className = 'status';
    statusDiv.style.display = 'none';
    downloadLink.style.display = 'none';
  };
  
  document.getElementById('j2pForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (selectedFiles.length === 0) {
      statusDiv.className = 'status error';
      statusDiv.textContent = '❌ Please select at least one JPG image';
      return;
    }
    
    statusDiv.className = 'status loading';
    statusDiv.textContent = `🔄 Converting ${selectedFiles.length} image(s) to PDF...`;
    downloadLink.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = '⏳ Converting...';

    const fd = new FormData();
    for (const f of selectedFiles) fd.append('files', f);
    fd.append('page_size', pageSizeSelect.value);

    try {
      const res = await fetch('/api/jpg-to-pdf', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        statusDiv.className = 'status success';
        statusDiv.textContent = '✅ ' + (data.message || 'Conversion complete!');
        const url = data.download_url || '/download/' + data.filename;
        downloadLink.href = url;
        downloadLink.download = data.filename || 'converted.pdf';
        downloadLink.style.display = 'inline-block';
      } else {
        statusDiv.className = 'status error';
        statusDiv.textContent = '❌ ' + (data.error || 'Conversion failed');
      }
    } catch(err) {
      statusDiv.className = 'status error';
      statusDiv.textContent = '❌ Error: ' + err.message;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '🖼️ Convert to PDF';
    }
  });
</script>
</body>
</html>
