<!DOCTYPE html>
<html>
<head>
  <title>Merge PDF Online Free | NPKPadala</title>
  <meta name="description" content="Merge PDF files online for free. Fast, secure and easy to use.">
</head>
<body>

<h1>Merge PDF Online</h1>
<p>Combine multiple PDF files into one document. No signup required.</p>

<input type="file" id="files" multiple>
<button onclick="mergePDF()">Merge PDF</button>

<p id="status"></p>
<a id="download" style="display:none;">Download</a>

<script>
async function mergePDF() {
  const files = document.getElementById("files").files;

  if (files.length < 2) {
    alert("Select at least 2 PDFs");
    return;
  }

  let formData = new FormData();
  for (let f of files) {
    formData.append("files", f);
  }

  document.getElementById("status").innerText = "Processing...";

  let res = await fetch("/api/merge", {
    method: "POST",
    body: formData
  });

  let data = await res.json();

  if (data.success) {
    document.getElementById("status").innerText = "Success!";
    let link = document.getElementById("download");
    link.href = data.download_url;
    link.innerText = "Download File";
    link.style.display = "block";
  } else {
    document.getElementById("status").innerText = data.error;
  }
}
</script>

</body>
</html>
