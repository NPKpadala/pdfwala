<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Merge multiple PDF files into one document online. Free, fast, no sign-up required."/>
  <title>Merge PDF Online — PDFWala</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { font-size: 32px; margin-bottom: 12px; color: #1a1a2e; }
    .sub { color: #666; margin-bottom: 32px; line-height: 1.6; }
    input[type="file"] {
      width: 100%;
      padding: 40px 20px;
      border: 2px dashed #ddd;
      border-radius: 16px;
      background: #fafafa;
      cursor: pointer;
      margin-bottom: 20px;
    }
    input[type="file"]:hover { border-color: #667eea; background: #f8f9ff; }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      display: none;
    }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .status.loading { background: #e7f3ff; color: #004085; display: block; }
    .download-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 600;
    }
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
    }
    @media (max-width: 600px) {
      .card { padding: 24px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>📄 Merge PDF Files</h1>
    <p class="sub">Combine multiple PDF documents into a single file instantly.<br>No sign-up required. 100% free and secure.</p>

    <form id="mergeForm" enctype="multipart/form-data">
      <input type="file" id="files" name="files" accept=".pdf" multiple required/>
      <button type="submit" id="submitBtn">🔄 Merge PDFs</button>
    </form>

    <div id="status" class="status"></div>
    <a id="downloadLink" class="download-btn" style="display:none" href="#">⬇ Download Merged PDF</a>
  </div>

  <div class="footer">
    <a href="/pdfwala/compress-pdf">🗜️ Compress PDF</a>
    <a href="/pdfwala/pdf-to-word">📝 PDF to Word</a>
    <a href="/pdfwala/jpg-to-pdf">🖼️ JPG to PDF</a>
    <a href="/pdfwala/">🏠 All Tools</a>
  </div>
</div>

<script>
  document.getElementById('mergeForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const status = document.getElementById('status');
    const link = document.getElementById('downloadLink');
    const submitBtn = document.getElementById('submitBtn');
    const files = document.getElementById('files').files;
    
    if (files.length < 2) {
      status.className = 'status error';
      status.textContent = '❌ Please select at least 2 PDF files to merge';
      return;
    }
    
    status.className = 'status loading';
    status.textContent = '🔄 Merging ' + files.length + ' files...';
    link.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = '⏳ Processing...';

    const fd = new FormData();
    for (const f of files) fd.append('files', f);

    try {
      const res = await fetch('/api/merge', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        status.className = 'status success';
        status.textContent = '✅ ' + (data.message || 'Merge complete!');
        const url = data.download_url || '/download/' + data.filename;
        link.href = url;
        link.download = data.filename || 'merged.pdf';
        link.style.display = 'inline-block';
      } else {
        status.className = 'status error';
        status.textContent = '❌ ' + (data.error || 'Merge failed');
      }
    } catch(err) {
      status.className = 'status error';
      status.textContent = '❌ Error: ' + err.message;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '🔄 Merge PDFs';
    }
  });
</script>
</body>
</html>
