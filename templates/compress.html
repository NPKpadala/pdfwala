<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Compress PDF Online — PDFWala</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { font-size: 32px; margin-bottom: 12px; color: #1a1a2e; }
    .sub { color: #666; margin-bottom: 32px; line-height: 1.6; }
    input[type="file"], select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { transform: translateY(-2px); }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      display: none;
    }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .status.loading { background: #e7f3ff; color: #004085; display: block; }
    .download-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 40px;
    }
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer a { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>🗜️ Compress PDF</h1>
    <p class="sub">Reduce PDF file size while maintaining quality. Free and instant.</p>

    <form id="compressForm" enctype="multipart/form-data">
      <input type="file" id="file" name="file" accept=".pdf" required/>
      <select id="quality" name="quality">
        <option value="low">Maximum Compression</option>
        <option value="medium" selected>Balanced (Recommended)</option>
        <option value="high">High Quality</option>
      </select>
      <button type="submit" id="submitBtn">🗜️ Compress PDF</button>
    </form>

    <div id="status" class="status"></div>
    <a id="downloadLink" class="download-btn" style="display:none" href="#">⬇ Download Compressed PDF</a>
  </div>

  <div class="footer">
    <a href="/pdfwala/merge-pdf">🔗 Merge PDF</a>
    <a href="/pdfwala/pdf-to-word">📝 PDF to Word</a>
    <a href="/pdfwala/jpg-to-pdf">🖼️ JPG to PDF</a>
    <a href="/pdfwala/">🏠 All Tools</a>
  </div>
</div>

<script>
document.getElementById('compressForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const status = document.getElementById('status');
  const link = document.getElementById('downloadLink');
  const submitBtn = document.getElementById('submitBtn');
  const file = document.getElementById('file').files[0];
  
  if (!file) {
    status.className = 'status error';
    status.textContent = '❌ Please select a PDF file';
    return;
  }
  
  status.className = 'status loading';
  status.textContent = '🔄 Compressing...';
  link.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ Processing...';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('quality', document.getElementById('quality').value);

  try {
    const res = await fetch('/api/compress', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      status.className = 'status success';
      status.textContent = '✅ ' + (data.message || 'Compression complete!');
      const url = data.download_url || '/download/' + data.filename;
      link.href = url;
      link.download = data.filename || 'compressed.pdf';
      link.style.display = 'inline-block';
    } else {
      status.className = 'status error';
      status.textContent = '❌ ' + (data.error || 'Compression failed');
    }
  } catch(err) {
    status.className = 'status error';
    status.textContent = '❌ Error: ' + err.message;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🗜️ Compress PDF';
  }
});
</script>
</body>
</html>
